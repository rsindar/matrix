---
- name: Copy {{ tuwunel_package_name }}
  ansible.builtin.copy:
    src: "{{ tuwunel_package_name }}"
    dest: /tmp/{{ tuwunel_package_name }}
    mode: "0644"
  when: tuwunel_local_install

- name: Install Tuwunel from local file
  ansible.builtin.apt:
    deb: /tmp/{{ tuwunel_package_name }}
    state: present
  when: tuwunel_local_install

- name: Install Tuwunel from Internet
  ansible.builtin.apt:
    deb: "{{ tuwunel_package_url }}"
    state: present
  when: not tuwunel_local_install

- name: Copy Tuwunel configuration
  ansible.builtin.template:
    src: tuwunel.toml.j2
    dest: /etc/tuwunel/tuwunel.toml
    mode: "0644"
    owner: root
    group: root
  notify: Restart tuwunel

- name: Start Tuwunel service
  ansible.builtin.systemd:
    name: tuwunel.service
    state: started
    enabled: true

- name: Show Tuwunel registration token
  ansible.builtin.debug:
    msg: "Matrix registration token: '{{ tuwunel_reg_token }}'. NB! The first registered user will be granted admin permissions."
